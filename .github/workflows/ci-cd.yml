name: CI/CD Pipeline VZeta

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Construcción y subida de la App
      - name: Build and Push myapp_container
        uses: docker/build-push-action@v5
        with:
          context: ./myapp
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest

      # Construcción y subida de NGINX Proxy
      - name: Build and Push mynginx_container
        uses: docker/build-push-action@v5
        with:
          context: ./mynginx
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mynginx:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue remoto por SSH en AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # Crear red personalizada si no existe (IE 2.4.1)
            docker network create vzeta-net || true
            
            # Detener y eliminar contenedores previos para actualización ágil
            docker stop myapp_container mynginx_container || true
            docker rm myapp_container mynginx_container || true
            
            # Descargar últimas imágenes desde el registro público/privado
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mynginx:latest
            
            # Asegurar directorio local para persistencia (Bind Mount - IE 3.3.1)
            mkdir -p ~/vzeta_data
            
            # Desplegar App con red, alias y Bind Mount
            docker run -d \
              --name myapp_container \
              --network vzeta-net \
              --network-alias myapp-service \
              -v /home/ubuntu/vzeta_data:/usr/share/nginx/html/persistent \
              ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
              
            # Desplegar Reverse Proxy exponiendo puerto 80 al exterior
            docker run -d \
              --name mynginx_container \
              --network vzeta-net \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/mynginx:latest
